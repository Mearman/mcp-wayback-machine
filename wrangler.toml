#:schema node_modules/wrangler/config-schema.json

name = "mcp-wayback-machine"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Workers KV binding for response caching.
# Free tier: 100k reads/day, 1k writes/day.
[[kv_namespaces]]
binding = "CACHE_KV"
id = "<your-kv-namespace-id>"

# Durable Object for cross-request rate limiting.
# A singleton DO (fixed ID) maintains a shared sliding window
# across all Worker invocations.
[[durable_objects.bindings]]
name = "RATE_LIMIT_DO"
class_name = "RateLimitDurableObject"

# Durable Object migration — creates the DO class on first deploy.
[[migrations]]
tag = "v1"
new_classes = ["RateLimitDurableObject"]

# Optional: IA S3 credentials for higher SPN2 rate limits.
# Set via `wrangler secret put WAYBACK_ACCESS_KEY` etc.
#
# Optional: Bearer token for MCP client authentication.
# When set, clients must send `Authorization: Bearer <token>`.
# Set via `wrangler secret put MCP_AUTH_TOKEN`.
# When absent, the Worker accepts unauthenticated requests.
#
# WAYBACK_ACCESS_KEY = ""
# WAYBACK_SECRET_KEY = ""
# MCP_AUTH_TOKEN = ""
