name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  lint-commits:
    name: Lint commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        run: |
          pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level high

  check:
    name: Check
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm check

  test:
    name: Test — Node ${{ matrix.node-version }}
    needs: audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 22
          - 24
          - 26
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm test

  coverage:
    name: Coverage
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm test:coverage

      - run: pnpm _test:untested

  release:
    name: Release to npmjs
    runs-on: ubuntu-latest
    needs: [check, test, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      released: ${{ steps.detect-release.outputs.released }}
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
          # Do NOT set registry-url — it creates an .npmrc that overrides OIDC

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm build

      - name: Release
        id: detect-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm exec semantic-release 2>&1 | tee release-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if grep -q "Published release" release-output.txt; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
          exit $EXIT_CODE

      # MCP Registry publishing — generates server.json from the
      # already-bumped package.json, then publishes to the registry.
      # Ref: https://modelcontextprotocol.io/registry/github-actions
      - name: Generate server.json
        if: steps.detect-release.outputs.released == 'true'
        run: pnpm generate:server-json

      - name: Install mcp-publisher
        if: steps.detect-release.outputs.released == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        if: steps.detect-release.outputs.released == 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  publish-aliases:
    name: Publish alias — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - name: wayback-machine-mcp
            registry: https://registry.npmjs.org
            token: NPM_TOKEN
            provenance: --provenance
          - name: mcp-internet-archive
            registry: https://registry.npmjs.org
            token: NPM_TOKEN
            provenance: --provenance
          - name: internet-archive-mcp
            registry: https://registry.npmjs.org
            token: NPM_TOKEN
            provenance: --provenance
          - name: "@mearman/mcp-wayback-machine"
            registry: https://npm.pkg.github.com
            token: GITHUB_TOKEN
            provenance: --no-provenance
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: ${{ matrix.registry }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish
        run: |
          npm pkg set name=${{ matrix.name }}
          pnpm publish --access public --no-git-checks ${{ matrix.provenance }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets[matrix.token] }}
