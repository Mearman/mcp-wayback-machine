name: Dependabot auto-merge

on:
    pull_request:
        types: [opened]

permissions:
    pull-requests: write
    contents: write

jobs:
    auto-merge:
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - run: gh pr merge --auto --rebase "$PR_URL"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
